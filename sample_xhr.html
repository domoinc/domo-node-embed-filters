<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sales Dashboard - XHR</title>
    <link rel="stylesheet" href="/styles.css" />
    <script src="/clientScript.js"></script>
  </head>
  <body>
    <header class="header">
      <h1 class="header-title">Sales Dashboard</h1>
      <a href="/logout" class="logout-button">Logout</a>
    </header>

    <div class="layout">
      <div class="content">
        <form id="filter_form" class="filter-form" onsubmit="form_submit(event)">
          <div class="form-group">
            <label for="column_input" class="filter-label">Column:</label>
            <input
              id="column_input"
              type="text"
              name="column"
              class="filter-input"
              placeholder="Enter column name"
            />
          </div>
          <div class="form-group">
            <label for="value_input" class="filter-label">Value:</label>
            <input
              id="value_input"
              type="text"
              name="value"
              class="filter-input"
              placeholder="Enter filter value"
            />
          </div>
          <button type="submit" class="filter-button">Apply Filter</button>
        </form>

        <div class="charts-section">
          <h2 class="charts-title">
            Charts for <span class="charts-subtitle">USER</span>
          </h2>
          
          <div class="chart-container">
            <iframe id="iframe" src=""></iframe>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
